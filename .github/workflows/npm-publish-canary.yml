name: Publish canary package to NPM

on:
  push:
    branches-ignore:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org/
      - run: corepack enable
      - run: yarn
      - run: yarn build:all
      - name: Set canary version
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/javascript/package.json', 'utf8'));
            pkg.version = pkg.version + '-' + '$BRANCH' + '.' + '$SHA';
            fs.writeFileSync('packages/javascript/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Publishing version: ' + pkg.version);
          "
      - run: yarn workspace @hawk.so/javascript npm publish --access=public --tag canary
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
