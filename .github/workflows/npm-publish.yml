name: Publish packages to NPM

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish-core:
    uses: ./.github/workflows/publish-package.yml
    with:
      workspace: '@hawk.so/core'
      path: packages/core
    secrets: inherit

  publish-javascript:
    uses: ./.github/workflows/publish-package.yml
    with:
      workspace: '@hawk.so/javascript'
      path: packages/javascript
    secrets: inherit

  notify:
    needs: [publish-core, publish-javascript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get package info
        id: package
        uses: codex-team/action-nodejs-package-info@v1
        with:
          path: packages/javascript
      - name: Send a message
        uses: codex-team/action-codexbot-notify@v1
        with:
          webhook: ${{ secrets.CODEX_BOT_WEBHOOK_HAWK }}
          message: '📦 [${{ steps.package.outputs.name }}](${{ steps.package.outputs.npmjs-link }}) ${{ steps.package.outputs.version }} was published'
          parse_mode: 'markdown'
          disable_web_page_preview: true
